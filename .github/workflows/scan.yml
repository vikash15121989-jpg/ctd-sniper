name: Spring Scanner Auto
on:
  schedule:
    - cron: '30 13 * * 1-5' # 7:00 PM IST Mon-Fri
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install yfinance pandas numpy
      - run: python main.py

      - name: Commit CSV
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add spring_breakout_signals.csv
          git commit -m "Update signals: $(date)" || exit 0
          git push
