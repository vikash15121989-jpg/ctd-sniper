name: Spring Breakout Scanner
on:
  schedule:
    - cron: '30 13 * * 1-5'  # 7 PM IST, Mon-Fri
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas
      - run: python main.py
      - uses: actions/upload-artifact@v4
        with:
          name: spring-breakout-signals
          path: spring_breakout_signals.csv
